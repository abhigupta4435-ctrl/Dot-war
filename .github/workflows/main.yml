name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK
        run: |
          sudo apt-get install -y aapt apksigner dx
          mkdir -p out
          cp game.html out/
          cat > build.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          SDK_URL="https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q $SDK_URL -O cmdtools.zip
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/battlezone/game
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          cp game.html app/src/main/assets/
          cp AndroidManifest.xml app/src/main/
          cp MainActivity.java app/src/main/java/com/battlezone/game/
          cp styles.xml app/src/main/res/values/
          cp strings.xml app/src/main/res/values/
          python3 -c "
          import struct,zlib
          def png(s):
            r=b''.join(b'\x00'+bytes([34,197,94]*s) for _ in range(s))
            def c(t,d):
              x=struct.pack('>I',len(d))+t+d
              return x+struct.pack('>I',zlib.crc32(x[4:])&0xffffffff)
            return b'\x89PNG\r\n\x1a\n'+c(b'IHDR',struct.pack('>IIBBBBB',s,s,8,2,0,0,0))+c(b'IDAT',zlib.compress(r))+c(b'IEND',b'')
          open('app/src/main/res/mipmap-mdpi/ic_launcher.png','wb').write(png(48))
          "
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cat > settings.gradle << 'EOF'
          rootProject.name="battlezone"
          include ':app'
          EOF
          cat > build.gradle << 'EOF'
          buildscript{repositories{google();mavenCentral()};dependencies{classpath 'com.android.tools.build:gradle:8.2.0'}}
          allprojects{repositories{google();mavenCentral()}}
          EOF
          cat > app/build.gradle << 'EOF'
          plugins{id 'com.android.application'}
          android{compileSdk 34;namespace 'com.battlezone.game';defaultConfig{applicationId "com.battlezone.game";minSdk 21;targetSdk 34;versionCode 1;versionName "1.0"};buildTypes{debug{debuggable true}};compileOptions{sourceCompatibility JavaVersion.VERSION_1_8;targetCompatibility JavaVersion.VERSION_1_8}}
          EOF
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          EOF
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.2/bin/gradle wrapper --quiet
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          SCRIPT
          chmod +x build.sh
          bash build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: DOT-WAR-BATTLEZONE-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
