name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/battlezone/game
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          cp game.html app/src/main/assets/
          cp AndroidManifest.xml app/src/main/
          cp MainActivity.java app/src/main/java/com/battlezone/game/
          cp styles.xml app/src/main/res/values/
          cp strings.xml app/src/main/res/values/
          cp build.gradle app/build.gradle
          python3 -c "
import struct,zlib
def png(s):
  r=b''.join(b'\x00'+bytes([34,197,94]*s) for _ in range(s))
  def c(t,d):
    x=struct.pack('>I',len(d))+t+d
    return x+struct.pack('>I',zlib.crc32(x[4:])&0xffffffff)
  return b'\x89PNG\r\n\x1a\n'+c(b'IHDR',struct.pack('>IIBBBBB',s,s,8,2,0,0,0))+c(b'IDAT',zlib.compress(r))+c(b'IEND',b'')
for s,n in [(48,'mdpi'),(72,'hdpi'),(96,'xhdpi'),(144,'xxhdpi'),(192,'xxxhdpi')]:
  open(f'app/src/main/res/mipmap-{n}/ic_launcher.png','wb').write(png(s))
"
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: DOT-WAR-BATTLEZONE-APK
          path: app/build/outputs/apk/debug/app-debug.apk
