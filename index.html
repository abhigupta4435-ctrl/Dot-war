// ─── level config ──────────────────────────────────────────────────────────
function getLevelConfig(lvl) {
    const t = (lvl - 1) / (TOTAL_LEVELS - 1);
    return {
        enemyCount: Math.floor(5 + t * 45),
        enemyHp: Math.floor(60 + t * 440),
        enemyDamage: Math.round((8 + t * 42) * 10) / 10,
        enemySpeed: Math.round((1.1 + t * 1.9) * 10) / 10,
        enemyShootCd: Math.floor(90 - t * 55),
        lootCount: Math.floor(20 + t * 20),
        baseZoneDmg: Math.round((0.06 + t * 0.14) * 100) / 100,
        coinReward: Math.floor(10 + lvl * 3),
    };
}
function diffLabel(lvl) {
    if (lvl <= 20)
        return { label: "EASY", color: "#22c55e" };
    if (lvl <= 50)
        return { label: "MEDIUM", color: "#84cc16" };
    if (lvl <= 80)
        return { label: "HARD", color: "#f59e0b" };
    if (lvl <= 110)
        return { label: "VETERAN", color: "#f97316" };
    if (lvl <= 140)
        return { label: "ELITE", color: "#ef4444" };
    if (lvl <= 170)
        return { label: "LEGEND", color: "#a855f7" };
    return { label: "NIGHTMARE", color: "#dc2626" };
}

const rand = (a, b) => Math.random() * (b - a) + a;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
// ── Map-specific obstacle generation ─────────────────────────────────────
function genObstacles(mc) {
    const id = mc ? mc.id : "grasslands";
    const obstacles = [];
    if (id === "grasslands") {
        // Round trees
        for (let i = 0; i < 55; i++)
            obstacles.push({ type: "tree", x: rand(60, MAP_W - 60), y: rand(60, MAP_H - 60), r: rand(18, 30) });
        // Wooden huts
        for (let i = 0; i < 14; i++)
            obstacles.push({ type: "building", x: rand(100, MAP_W - 200), y: rand(100, MAP_H - 200), w: rand(80, 160), h: rand(80, 140), clr: `hsl(${rand(20, 40)},${rand(40, 55)}%,${rand(25, 35)}%)` });
    }
    else if (id === "desert") {
        // Cacti — tall + cross-arm shape
        for (let i = 0; i < 35; i++)
            obstacles.push({ type: "cactus", x: rand(80, MAP_W - 80), y: rand(80, MAP_H - 80), h: rand(28, 50), r: rand(9, 14) });
        // Sand ruins / rubble blocks
        for (let i = 0; i < 22; i++)
            obstacles.push({ type: "ruin", x: rand(100, MAP_W - 200), y: rand(100, MAP_H - 200), w: rand(60, 130), h: rand(50, 110), clr: `hsl(${rand(32, 42)},${rand(55, 70)}%,${rand(28, 38)}%)` });
        // Sand dunes (oval bumps, no collision — decorative only)
        for (let i = 0; i < 20; i++)
            obstacles.push({ type: "dune", x: rand(60, MAP_W - 60), y: rand(60, MAP_H - 60), rx: rand(30, 55), ry: rand(12, 22) });
    }
    else if (id === "urban") {
        // City buildings with roads
        for (let i = 0; i < 32; i++)
            obstacles.push({ type: "cityblock", x: rand(60, MAP_W - 180), y: rand(60, MAP_H - 180), w: rand(90, 200), h: rand(90, 180), clr: `hsl(${rand(200, 230)},${rand(12, 22)}%,${rand(20, 30)}%)`, roofClr: `hsl(${rand(200, 230)},${rand(15, 28)}%,${rand(30, 42)}%)` });
        // Street lights (small circles, decorative)
        for (let i = 0; i < 18; i++)
            obstacles.push({ type: "streetlight", x: rand(50, MAP_W - 50), y: rand(50, MAP_H - 50) });
    }
    else if (id === "forest") {
        // Huge dark trees — very dense
        for (let i = 0; i < 95; i++)
            obstacles.push({ type: "bigtree", x: rand(50, MAP_W - 50), y: rand(50, MAP_H - 50), r: rand(22, 42), tier: Math.floor(rand(1, 4)) });
        // Mossy boulders
        for (let i = 0; i < 10; i++)
            obstacles.push({ type: "boulder", x: rand(100, MAP_W - 100), y: rand(100, MAP_H - 100), r: rand(20, 35) });
        // Mushrooms (decorative)
        for (let i = 0; i < 20; i++)
            obstacles.push({ type: "mushroom", x: rand(60, MAP_W - 60), y: rand(60, MAP_H - 60), r: rand(10, 18) });
    }
    else if (id === "arctic") {
        // Snow-covered pine trees (tall spike shape)
        for (let i = 0; i < 40; i++)
            obstacles.push({ type: "pinetree", x: rand(60, MAP_W - 60), y: rand(60, MAP_H - 60), r: rand(16, 28) });
        // Ice boulders / glacier chunks
        for (let i = 0; i < 25; i++)
            obstacles.push({ type: "iceberg", x: rand(80, MAP_W - 80), y: rand(80, MAP_H - 80), r: rand(22, 40) });
        // Frozen bunkers
        for (let i = 0; i < 12; i++)
            obstacles.push({ type: "building", x: rand(100, MAP_W - 200), y: rand(100, MAP_H - 200), w: rand(80, 150), h: rand(70, 130), clr: `hsl(${rand(190, 215)},${rand(30, 50)}%,${rand(35, 50)}%)` });
    }
    else if (id === "volcanic") {
        // Lava rocks (jagged hexagons)
        for (let i = 0; i < 45; i++)
            obstacles.push({ type: "lavarock", x: rand(60, MAP_W - 60), y: rand(60, MAP_H - 60), r: rand(18, 38), sides: Math.floor(rand(5, 8)) });
        // Ash ruins
        for (let i = 0; i < 16; i++)
            obstacles.push({ type: "building", x: rand(100, MAP_W - 200), y: rand(100, MAP_H - 200), w: rand(70, 150), h: rand(60, 130), clr: `hsl(${rand(0, 15)},${rand(55, 75)}%,${rand(18, 28)}%)` });
        // Lava pools (oval, decorative)
        for (let i = 0; i < 12; i++)
            obstacles.push({ type: "lavapool", x: rand(80, MAP_W - 80), y: rand(80, MAP_H - 80), rx: rand(22, 45), ry: rand(14, 28) });
    }
    return obstacles;
}
